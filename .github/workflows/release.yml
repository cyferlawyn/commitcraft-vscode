name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - win32-x64
          - darwin-arm64
          - darwin-x64
          - linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package (${{ matrix.target }})
        run: npm run package:${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: commitcraft-${{ matrix.target }}-${{ github.ref_name }}
          path: "*.vsix"

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: vsix-files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: vsix-files/*.vsix
          generate_release_notes: true

  publish:
    name: Publish to Marketplace
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish all targets
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npm run build
          npx vsce publish --target win32-x64   --ignoreFile .vscodeignore.win32-x64   -p "$VSCE_PAT"
          npx vsce publish --target darwin-arm64 --ignoreFile .vscodeignore.darwin-arm64 -p "$VSCE_PAT"
          npx vsce publish --target darwin-x64   --ignoreFile .vscodeignore.darwin-x64   -p "$VSCE_PAT"
          npx vsce publish --target linux-x64    --ignoreFile .vscodeignore.linux-x64    -p "$VSCE_PAT"
